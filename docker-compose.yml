version: '3.8'

services:
  app:
    # For Dokploy: build from Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    # For production with registry: use image instead
    # image: ghcr.io/${GITHUB_USERNAME}/wordwaverisebackend:latest
    container_name: wordwaverise-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DRIVER=org.postgresql.Driver
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - JWT_REALM=${JWT_REALM}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - APP_ENV=production
      - AI_DOMEN=${AI_DOMEN}
      - AI_API=${AI_API}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wordwaverise-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: wordwaverise-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wordwaverise-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  wordwaverise-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
